<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Trọng Hiếu X Quang Khôi</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      text-align: center;
      padding: 20px;
      animation: fadeIn 1s ease;
    }

    h1 {
      color: #38bdf8;
      text-shadow: 0 0 10px #38bdf8;
      animation: glow 2s infinite alternate;
    }

    .card {
      background: rgba(30, 41, 59, 0.8);
      padding: 20px;
      margin: 20px auto;
      border-radius: 15px;
      width: 300px;
      box-shadow: 0 0 15px rgba(56,189,248,0.2);
      transition: 0.3s;
      backdrop-filter: blur(10px);
    }

    .card:hover {
      transform: translateY(-10px) scale(1.03);
      box-shadow: 0 0 25px rgba(56,189,248,0.6);
    }

    .price {
      color: #22c55e;
      font-size: 22px;
      margin: 10px 0;
      text-shadow: 0 0 5px #22c55e;
    }

    button {
      background: linear-gradient(45deg, #38bdf8, #0ea5e9);
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      color: white;
      transition: 0.3s;
      box-shadow: 0 0 10px rgba(56,189,248,0.5);
    }

    button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(56,189,248,1);
    }

    /* Animation */
    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    @keyframes glow {
      from {text-shadow: 0 0 5px #38bdf8;}
      to {text-shadow: 0 0 20px #38bdf8;}
    }

  </style>
</head>
<body>

  <h1>🔥 Trọng Hiếu X Quang Khôi 🔥</h1>
  <p>Dịch vụ tối ưu máy & fake lag</p>

  <div class="card">
    <h2>⚡ Tối ưu hệ suất</h2>
    <p>Giúp máy mượt hơn, FPS cao hơn khi chơi game</p>
    <div class="price">100K</div>
    <button onclick="window.open('https://www.facebook.com/share/1BNB4TQC1f/')">
      Liên hệ Trọng Hiếu
    </button>
  </div>

  <div class="card">
    <h2>🎯 Fake Lag</h2>
    <p>Giúp chơi game dễ hơn</p>
    <div class="price">50K</div>
    <button onclick="window.open('https://www.facebook.com/share/17JaaepW7V/')">
      Liên hệ Quang Khôi
    </button>
  </div>

</body>
</html>
